<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Page</title>
    <style>
        .navbar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            padding: 20px;
            border-bottom: 1px solid black;
        }

        .main-container {
            display: flex;
        }

        .parent-container,
        .cart-container {
            width: 50%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 20px;
        }

        ul {
            list-style: none;
            border: 1px solid black;
            padding: 20px;
        }

        button {
            margin-top: 10px;
            padding: 8px 12px;
        }

        h2 {
            padding: 20px 20px 0 20px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div>Product</div>
        <div>AddToCart</div>
    </div>

    <div class="main-container">
        <div>
            <h2>Product List</h2>
            <div class="parent-container"></div>
        </div>

        <div>
            <h2>Cart Items</h2>
            <div class="cart-container"></div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
