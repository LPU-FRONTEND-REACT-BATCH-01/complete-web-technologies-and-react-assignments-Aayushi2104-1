<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;

        }
        .container{
            display: grid;
            background-color: lightslategray;
            grid-template-columns:150px 150px 150px 150px;
            grid-template-rows: 150px 150px 150px;
            gap: 10px;
            height: 100vh;
            width:100vw;
            justify-content: center;
            align-content: center;
        }
        .item1{
            background-color: greenyellow;
            padding: 20px;
            text-align: center;
            gap:10px;
            grid-row: 1/4;
        }
        .item2{
            background-color: greenyellow;
            padding: 20px;
            text-align: center;
            gap:10px;
            grid-column: 2/4;
        }
        .item3{
            background-color: red;
            padding: 20px;
            text-align: center;
            gap:10px;
        }
        .item4{
            background-color:orange;
            padding: 20px;
            text-align: center;
            gap:10px;
        }
        .item5{
            background-color:red;
            padding: 20px;
            text-align: center;
            gap:10px;
        }
        .item6{
            background-color:greenyellow;
            padding: 20px;
            text-align: center;
            gap:10px;
            grid-row:2/4;
            grid-column: 4/5;
        }
        .item7{
            background-color:red;
            padding: 20px;
            text-align: center;
            gap: 10px;
        }
        .item8{
            background-color:orange;
            padding: 20px;
            text-align: center;
            gap:10px;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="item1"></div>
        <div class="item2"></div>
        <div class="item3"></div>
        <div class="item4"></div>
        <div class="item5"></div>
        <div class="item6"></div>
        <div class="item7"></div>
        <div class="item8"></div>
    </div>
</body>
</html>
