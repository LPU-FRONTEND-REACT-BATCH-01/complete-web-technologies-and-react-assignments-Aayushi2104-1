<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            color: black;
        }
        .biryani >li{
            color: orange;
        }
        .lassi >li{
            color:green;
        }
       .sugar >ul>li{
            color: brown;
        }
        li+h1{
            color:grey;
        }
        .chicken+li{
            color: aqua;
        }

    </style>
</head>
<body>
    <ul class="biryani">
        <h1>Ingredients for Biryani</h1>
        <li>Basmati Rice</li>
        <li>Chicken</li>
        <div class="chicken">
            <ul>
                <li>Fried</li>
                <li>Grilled</li>
                <li>Roasted</li>
            </ul>
        </div>
        <li>Panner</li>
        <h1>Fighter Jet</h1>
        <li>Onions</li>
        <li>Spices</li>
    </ul>
    <ul class="lassi">
        <h1>Ingredients for Lassi</h1>
        <li>Milk</li>
        <li>Fruit</li>
        <li>Sugar</li>
        <div class="sugar">
            <ul>
                <li>White Sugar</li>
                <li>Brown Sugar</li>
            </ul>
        </div>
        <li>Cardamom</li>
    </ul>
</body>
</html>
