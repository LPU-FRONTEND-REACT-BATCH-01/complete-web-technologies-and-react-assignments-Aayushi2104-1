<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .biryani >li{
            color: orange;
        }
        .lassi li{
            color:green;
        }
        h1~li{
            background-color: lightblue;
        }
        h1+li{
            background-color: lightpink;
        }

    </style>
</head>
<body>
    <ul class="biryani">
        <h1>Ingredients for Biryani</h1>
        <li>Basmati Rice</li>
        <li>Chicken</li>
            <div>
                <ul>
                    <li>Fried</li>
                    <li>Grilled</li>
                    <li>Roasted</li>
                </ul>
            </div>
        <li>Onions</li>
        <li>Tomatoes</li>
        <li>Spices</li>
    </ul>
    <ul class="lassi">
        <h1>Ingredients for Lassi</h1>
        <li>Milk</li>
        <li>Fruit</li>
        <li>Sugar</li>
        <li>Cardamom</li>
    </ul>
</body>
</html>
