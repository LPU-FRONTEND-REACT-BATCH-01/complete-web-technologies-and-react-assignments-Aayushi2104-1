<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a:link{
            color:yellowgreen;
        }
        a:visited{
            color:blue;
        } 
         a:active{
            color: red;
        }
        h1:hover{
            color: orange;
        }
        input:focus{
            border: 2px solid lightblue;

        }
        input:hover{

            background-color:red;
        }
        h1:before{
            content: "Learning CSS is fun!";
            display: block;
            color: blueviolet;
        }
         h1:after{
            content: "practiced CSS today!";
            display: block;
            color: lightcoral;
        }
        

    </style>
</head>
<body>
    <a href="https://www.flipkart.com">index1</a>
    <h1>My Website</h1>
    <input type="text">
</body>
</html>
