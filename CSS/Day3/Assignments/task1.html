<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100%;
            height: 10%;
            background-color: blueviolet;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;


        }
        .first{
            display:flex;
            align-items: center;
            gap:20px;
        }
        .left{
            display: flex;
            align-items: center;
            gap: 18px;
        }
        .search{
            width: 100px;
            height: 50px;
            background-color: black;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            left: 20px;
            position: relative;

        }
        .items{
            width: 50px;
            height: 50px;
            border: 2px solid black;
            background-color: red;
            border-radius: 5px;

        }
    </style>
</head>
<body>
   <div class="container">

    <div class="search">search</div>
    <div class="first">
        <div class="item1 items">items1</div>
        <div class="item2 items">items2</div> 
        <div class="item3 items">items3</div>
    </div>

</div>
</body>
</html>
