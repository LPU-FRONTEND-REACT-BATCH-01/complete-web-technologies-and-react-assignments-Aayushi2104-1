<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    body{
        background-color: lightblue;
    }
    .todo-app{
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: flex-start;
    }

    .input-row{
    display: flex;
    flex-direction: row;
    gap: 10px;
    }

    .task-list{
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: flex-start;
    }

    ul{
        padding-left: 0;
        margin: 0;
    }
    input{
        width: 200px;
        height: 30px;
        border-radius: 5px;
        border: 2px solid black;
    }
    button{
        width: 50px;
        height: 30px;
        border-radius: 5px;
        border: 2px solid black;
        background-color: lightgreen;
    }
    .task-text.textstrike{
        text-decoration: line-through;
    }
    li {
    display: flex;
    justify-content: space-between; 
    align-items: center;
    margin-top: 10px;
}

.task-content {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 10px;
    flex-wrap: nowrap;
}

li button {
    margin-left: 10px; 
}
 

</style>
</head>
<body>
    <div class="todo-app">
    <div class="input-row">
        <input type="text">
        <button id="button">add</button>
    </div>
    <div class="task-list">
        <ul></ul>
    </div>
    </div>
    <script src="task.js"></script>
</body>
</html>
